<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联想海外业务 · 数字化转型实习 | 候选人评估系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#F0F2F5;color:#1a1a2e;min-height:100vh}
a{text-decoration:none}

/* ── Header ── */
.header{background:linear-gradient(135deg,#0f0f1e 0%,#1a1a2e 60%,#16213e 100%);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4)}
.hd-left{display:flex;align-items:center;gap:14px}
.lenovo-badge{width:46px;height:46px;background:#CC0000;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;letter-spacing:-1px}
.hd-text .co{font-size:20px;font-weight:700;color:#fff;letter-spacing:1px}
.hd-text .sub{font-size:12px;color:#9ca3af;margin-top:2px}
.hd-nav{display:flex;gap:10px}
.btn{padding:9px 22px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:#CC0000;color:#fff;border:none}
.btn-primary:hover{background:#a80000}
.btn-ghost{background:transparent;color:#d1d5db;border:1px solid #4b5563}
.btn-ghost:hover{border-color:#CC0000;color:#fff}

/* ── Stats Bar ── */
.stats-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 40px;display:flex;gap:0}
.stat{flex:1;text-align:center;padding:16px 0;border-right:1px solid #f3f4f6}
.stat:last-child{border-right:none}
.stat-n{font-size:26px;font-weight:800;color:#CC0000}
.stat-l{font-size:11px;color:#6b7280;margin-top:2px}

/* ── Main ── */
.main{max-width:1360px;margin:0 auto;padding:32px 40px}
.sec-title{font-size:18px;font-weight:700;color:#1a1a2e;border-left:4px solid #CC0000;padding-left:12px;margin-bottom:22px;display:flex;align-items:center;gap:10px}
.sec-title span{font-size:12px;font-weight:400;color:#9ca3af;margin-left:4px}

/* ── Candidate Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;margin-bottom:50px}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.06);cursor:pointer;transition:.25s;border:2px solid transparent;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.12);border-color:#CC0000}

.rank-badge{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}
.rank-1{background:linear-gradient(135deg,#f59e0b,#d97706)}
.rank-2{background:linear-gradient(135deg,#9ca3af,#6b7280)}
.rank-3{background:linear-gradient(135deg,#cd7c2f,#b45309)}
.rank-other{background:#e5e7eb;color:#6b7280}

.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.cinfo{flex:1}
.cname{font-size:17px;font-weight:700}
.cschool{font-size:12px;color:#6b7280;margin-top:3px}
.cdeg{font-size:11px;color:#9ca3af;margin-top:2px}
.cscore{text-align:center;flex-shrink:0;padding-right:22px}
.score-ring{width:46px;height:46px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;line-height:1.1}
.score-ring small{font-size:9px;font-weight:400}

.chart-wrap{height:155px;margin:8px -4px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{font-size:11px;padding:3px 9px;border-radius:10px;background:#f3f4f6;color:#4b5563}
.tag-red{background:#fff0f0;color:#CC0000}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:18px;width:100%;max-width:820px;max-height:92vh;overflow-y:auto;padding:32px}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.modal-name{font-size:24px;font-weight:800}
.modal-school{font-size:13px;color:#6b7280;margin-top:4px}
.close-btn{width:34px;height:34px;border-radius:50%;border:none;background:#f3f4f6;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:#fee2e2;color:#CC0000}
.modal-body{display:grid;grid-template-columns:1fr 1fr;gap:28px}
.modal-chart{height:280px}
.dim-title{font-size:13px;font-weight:600;color:#CC0000;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.highlight-list{list-style:none}
.highlight-list li{font-size:13px;color:#374151;padding:5px 0;border-bottom:1px solid #f9fafb;line-height:1.5}
.highlight-list li::before{content:"▸ ";color:#CC0000}
.score-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.smi{background:#f9fafb;border-radius:8px;padding:9px 12px}
.smi-d{font-size:10px;color:#9ca3af;margin-bottom:3px}
.smi-v{font-size:20px;font-weight:800;color:#1a1a2e}
.smi-bar{height:4px;background:#e5e7eb;border-radius:2px;margin-top:5px}
.smi-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#CC0000,#f87171)}
.eval-box{margin-top:20px;background:#fafafa;border-radius:10px;padding:14px 16px;font-size:13px;color:#4b5563;line-height:1.8;border-left:3px solid #CC0000}

/* ── Topics ── */
.topics-wrap{margin-bottom:50px}
.topic-card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 5px rgba(0,0,0,.05);border-left:4px solid #CC0000;overflow:hidden}
.topic-head{display:flex;align-items:center;gap:14px;padding:18px 22px;cursor:pointer;user-select:none}
.topic-num{width:34px;height:34px;border-radius:50%;background:#CC0000;color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topic-ttl{font-size:15px;font-weight:600;flex:1}
.topic-meta{display:flex;gap:6px;flex-shrink:0}
.topic-arrow{color:#CC0000;font-size:18px;transition:.2s;flex-shrink:0}
.topic-body{display:none;padding:0 22px 20px 70px;border-top:1px solid #f3f4f6}
.topic-body.open{display:block}
.topic-desc{font-size:14px;color:#4b5563;line-height:1.8;margin-bottom:12px;margin-top:14px}
.topic-pts{list-style:none}
.topic-pts li{font-size:13px;color:#6b7280;padding:4px 0 4px 14px;position:relative;line-height:1.6}
.topic-pts li::before{content:"·";color:#CC0000;position:absolute;left:0;font-size:18px;line-height:1.2}

/* ── Footer ── */
.footer{background:#1a1a2e;color:#6b7280;text-align:center;padding:18px;font-size:12px}

/* ── Login Gate ── */
.login-gate{position:fixed;inset:0;background:linear-gradient(135deg,#0f0f1e,#1a1a2e);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:18px;padding:44px 48px;max-width:400px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.4);text-align:center}
.login-icon{font-size:48px;margin-bottom:14px}
.login-title{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:6px}
.login-sub{font-size:13px;color:#6b7280;line-height:1.7;margin-bottom:24px}
.login-input{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:10px;font-size:18px;font-family:inherit;outline:none;text-align:center;letter-spacing:6px;transition:.2s}
.login-input:focus{border-color:#CC0000}
.login-btn{width:100%;padding:13px;background:#CC0000;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;transition:.2s}
.login-btn:hover{background:#a80000}
.login-err{color:#CC0000;font-size:13px;margin-top:10px;min-height:18px}

@media(max-width:700px){
  .header{padding:14px 18px}.stats-bar{padding:0 18px}.main{padding:20px 18px}
  .modal-body{grid-template-columns:1fr}
  .hd-text .sub{display:none}
}

/* ── Selection Mode ── */
.select-mode .card { cursor: pointer; }
.select-mode .card:hover { border-color: #3b82f6; }
.card-checkbox { position:absolute;top:12px;left:12px;width:22px;height:22px;border-radius:6px;border:2px solid #d1d5db;background:#fff;display:none;align-items:center;justify-content:center;z-index:10;transition:.15s;pointer-events:none; }
.select-mode .card-checkbox { display:flex; }
.card.selected { border-color:#3b82f6; background:#f0f7ff; }
.card.selected .card-checkbox { background:#3b82f6;border-color:#3b82f6;color:#fff; }

/* ── Floating Action Bar ── */
.sel-bar { position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;border-radius:50px;padding:14px 28px;display:none;align-items:center;gap:18px;box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:200;white-space:nowrap; }
.sel-bar.on { display:flex; }
.sel-count { font-size:15px;font-weight:600; }
.sel-confirm { background:#3b82f6;color:#fff;border:none;border-radius:30px;padding:9px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s; }
.sel-confirm:hover { background:#2563eb; }
.sel-cancel { background:transparent;color:#9ca3af;border:none;font-size:13px;cursor:pointer;font-family:inherit; }
.sel-cancel:hover { color:#fff; }

/* ── Group Modal ── */
.g-overlay { position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px); }
.g-overlay.on { display:flex; }
.g-modal { background:#fff;border-radius:18px;width:100%;max-width:500px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.2); }
.g-title { font-size:20px;font-weight:800;margin-bottom:6px; }
.g-sub { font-size:13px;color:#6b7280;margin-bottom:24px; }
.g-field { margin-bottom:16px; }
.g-label { font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;display:block; }
.g-input { width:100%;padding:10px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:.2s; }
.g-input:focus { border-color:#3b82f6; }
.g-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
.g-radio-group { display:flex;gap:16px; }
.g-radio { display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px; }
.g-selected-names { display:flex;flex-wrap:wrap;gap:6px;margin-top:8px; }
.g-name-chip { background:#eff6ff;color:#1d4ed8;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600; }
.g-actions { display:flex;gap:10px;margin-top:24px; }
.g-save { flex:1;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s; }
.g-save:hover { background:#2563eb; }
.g-cancel { padding:12px 20px;background:#f3f4f6;color:#374151;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit; }

/* ── Groups Section ── */
.groups-wrap { margin-bottom:50px; }
.group-card { background:#fff;border-radius:14px;padding:20px 24px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:4px solid #3b82f6;display:flex;align-items:center;gap:20px; }
.gc-time { text-align:center;min-width:80px; }
.gc-date { font-size:20px;font-weight:800;color:#1a1a2e; }
.gc-time-str { font-size:12px;color:#6b7280;margin-top:2px; }
.gc-format { font-size:11px;background:#eff6ff;color:#1d4ed8;border-radius:8px;padding:2px 8px;margin-top:4px;display:inline-block; }
.gc-divider { width:1px;height:60px;background:#e5e7eb;flex-shrink:0; }
.gc-info { flex:1; }
.gc-name { font-size:16px;font-weight:700;margin-bottom:8px; }
.gc-members { display:flex;flex-wrap:wrap;gap:6px; }
.gc-chip { display:flex;align-items:center;gap:5px;background:#f9fafb;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600; }
.gc-avatar { width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff; }
.gc-actions { display:flex;gap:8px;flex-shrink:0; }
.gc-edit { padding:7px 14px;background:#f3f4f6;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit; }
.gc-edit:hover { background:#e5e7eb; }
.gc-del { padding:7px 14px;background:#fee2e2;color:#CC0000;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit; }
.gc-del:hover { background:#fecaca; }
.gc-notes { font-size:12px;color:#9ca3af;margin-top:6px;font-style:italic; }

/* ── Group indicator dot on candidate cards ── */
.group-dot { position:absolute;bottom:12px;right:12px;font-size:10px;background:#3b82f6;color:#fff;border-radius:10px;padding:2px 7px;font-weight:600; }
</style>
</head>
<body>

<!-- Login Gate -->
<div class="login-gate" id="loginGate">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">考官专用页面</div>
    <div class="login-sub">此页面包含所有候选人评估信息，<br>请输入考官密码后访问。</div>
    <input class="login-input" id="loginPw" type="password" placeholder="••••••••" maxlength="20">
    <button class="login-btn" onclick="doLogin()">进入 →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- Header -->
<header class="header">
  <div class="hd-left">
    <div class="hd-text">
      <div class="co">候选人评估系统</div>
      <div class="sub">数字化转型实习岗 · 内部使用</div>
    </div>
  </div>
  <nav class="hd-nav">
    <button class="btn btn-ghost" id="selModeBtn" onclick="toggleSelectMode()">📅 创建面试分组</button>
    <a href="exam.html" class="btn btn-primary">📝 进入考试</a>
    <a href="results.html" class="btn btn-ghost">📊 考官后台</a>
  </nav>
</header>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat"><div class="stat-n">8</div><div class="stat-l">候选人总数</div></div>
  <div class="stat"><div class="stat-n">78.6</div><div class="stat-l">平均综合评分</div></div>
  <div class="stat"><div class="stat-n">6</div><div class="stat-l">评估维度</div></div>
  <div class="stat"><div class="stat-n">10</div><div class="stat-l">在线考题</div></div>
  <div class="stat"><div class="stat-n">5</div><div class="stat-l">分组讨论议题</div></div>
  <div class="stat"><div class="stat-n">3</div><div class="stat-l">海外顶尖院校</div></div>
</div>

<div class="main">
  <div class="sec-title">候选人多维能力评估 <span>点击卡片查看详情</span></div>
  <div class="grid" id="grid"></div>

  <!-- Interview Groups Section -->
  <div class="sec-title" id="groupsTitle" style="display:none">面试分组安排 <span id="groupsCount"></span></div>
  <div class="groups-wrap" id="groupsWrap" style="display:none"></div>

  <div class="sec-title">分组讨论议题 <span>5个讨论主题 · 联想业务 / 数字化转型 / 金融科技</span></div>
  <div class="topics-wrap" id="topics"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div>
        <div class="modal-name" id="mName"></div>
        <div class="modal-school" id="mSchool"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="dim-title">能力雷达图</div>
        <div class="modal-chart"><canvas id="mChart"></canvas></div>
      </div>
      <div>
        <div class="dim-title">核心亮点</div>
        <ul class="highlight-list" id="mHl"></ul>
        <div class="dim-title" style="margin-top:16px">各维度评分</div>
        <div class="score-mini-grid" id="mSc"></div>
      </div>
    </div>
    <div class="eval-box" id="mEval"></div>
  </div>
</div>

<!-- Selection Action Bar -->
<div class="sel-bar" id="selBar">
  <span class="sel-count" id="selCount">已选 0 人</span>
  <button class="sel-confirm" onclick="openGroupModal()">📅 创建分组</button>
  <button class="sel-cancel" onclick="toggleSelectMode()">取消</button>
</div>

<!-- Group Modal -->
<div class="g-overlay" id="gOverlay">
  <div class="g-modal">
    <div class="g-title">📅 创建面试分组</div>
    <div class="g-sub" id="gSub"></div>
    <div class="g-field">
      <label class="g-label">分组名称</label>
      <input class="g-input" id="gName" type="text" placeholder="例：第一批 · 产品方向">
    </div>
    <div class="g-row">
      <div class="g-field">
        <label class="g-label">面试日期</label>
        <input class="g-input" id="gDate" type="date">
      </div>
      <div class="g-field">
        <label class="g-label">面试时间</label>
        <input class="g-input" id="gTime" type="time">
      </div>
    </div>
    <div class="g-field">
      <label class="g-label">面试形式</label>
      <div class="g-radio-group">
        <label class="g-radio"><input type="radio" name="gFormat" value="线上" checked> 线上</label>
        <label class="g-radio"><input type="radio" name="gFormat" value="线下"> 线下</label>
        <label class="g-radio"><input type="radio" name="gFormat" value="混合"> 混合</label>
      </div>
    </div>
    <div class="g-field">
      <label class="g-label">备注（可选）</label>
      <textarea class="g-input" id="gNotes" rows="2" placeholder="面试地点、注意事项等…" style="resize:vertical"></textarea>
    </div>
    <div class="g-field">
      <label class="g-label">已选候选人</label>
      <div class="g-selected-names" id="gSelectedNames"></div>
    </div>
    <div class="g-actions">
      <button class="g-cancel" onclick="closeGroupModal()">取消</button>
      <button class="g-save" onclick="saveGroup()">保存分组 ✓</button>
    </div>
  </div>
</div>

<footer class="footer">联想集团海外业务事业部 · 数字化转型实习岗候选人评估系统 &copy; 2025</footer>

<script>
// ── Auth Gate ──
const GATE_PW = 'Lenovo@2025';
function doLogin(){
  const v = document.getElementById('loginPw').value;
  if(v === GATE_PW){
    sessionStorage.setItem('hr_auth','1');
    document.getElementById('loginGate').style.display='none';
  } else {
    document.getElementById('loginErr').textContent='密码错误，请重试';
    document.getElementById('loginPw').value='';
    document.getElementById('loginPw').focus();
  }
}
document.getElementById('loginPw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
// Auto-pass if already authenticated this session
if(sessionStorage.getItem('hr_auth')==='1') document.getElementById('loginGate').style.display='none';

const COLORS = ['#E53935','#1E88E5','#43A047','#8E24AA','#F4511E','#00897B','#3949AB','#D81B60'];
const DIM_LABELS = ['AI技术能力','产品思维','数字化洞察','国际视野','落地经验','业务分析'];
const DIM_KEYS = ['ai','product','digital','international','delivery','analysis'];

const candidates = [
  {
    name:'于泽龙', school:'东南大学', degree:'硕士 · 智能设计与先进建造（研二在读）',
    avatar:'泽', tags:['AI产品经理','Agent平台','快手大厂','雅思6.5'],
    highlights:[
      '快手AIDP平台 AI产品经理实习（2025.11—2026.03）',
      '主导20+角色用户深度访谈，完成8类核心平台需求',
      '工具调用成功率65%→95%，用户满意度提升5.2%',
      '智海星河 AI Agent 0→1 MVP 版本搭建（售前购Agent）',
      'AIGC内容账号独立运营，累积1,400+粉丝，2.3万+赞藏',
      '英语：雅思6.5 / 六级550+'

const ranked = [...candidates].map((c,i)=>({...c,origIdx:i,avg:Math.round(Object.values(c.scores).reduce((a,b)=>a+b,0)/6)}))

const rankClass = ['rank-1','rank-2','rank-3','rank-other','rank-other','rank-other','rank-other','rank-other'];

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  ranked.forEach((c, ri) => {
    const groups = loadGroups();
    const candidateGroups = groups.filter(g => g.members.includes(c.name));
    const groupDot = candidateGroups.length ? `<div class="group-dot">📅 ${candidateGroups.map(g=>g.name).join(', ')}</div>` : '';
    const isSelected = selectedCandidates.has(c.name);
    const card = document.createElement('div');
    card.className = 'card' + (isSelected ? ' selected' : '');
    card.innerHTML = `
      <div class="card-checkbox">✓</div>
      <div class="rank-badge ${rankClass[ri]}">#${ri+1}</div>
      <div class="card-top">
        <div class="avatar" style="background:${COLORS[c.origIdx]}">${c.avatar}</div>
        <div class="cinfo">
          <div class="cname">${c.name}</div>
          <div class="cschool">${c.school}</div>
          <div class="cdeg">${c.degree}</div>
        </div>
        <div class="cscore">
          <div class="score-ring" style="background:linear-gradient(135deg,${COLORS[c.origIdx]},${COLORS[c.origIdx]}99)">
            ${c.avg}<small>分</small>
          </div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="cc${c.origIdx}"></canvas></div>
      <div class="card-tags">
        ${c.tags.map((t,ti)=>`<span class="tag${ti===0?' tag-red':''}">${t}</span>`).join('')}
      </div>
      ${groupDot}`;
    card.onclick = (e) => selectMode ? toggleCardSelect(c.name, e) : openModal(c.origIdx);
    grid.appendChild(card);

    setTimeout(()=>{
      const canvas = document.getElementById(`cc${c.origIdx}`);
      if (!canvas) return;
      new Chart(canvas.getContext('2d'),{
        type:'radar',
        data:{
          labels:DIM_LABELS,
          datasets:[{
            data:DIM_KEYS.map(k=>c.scores[k]),
            backgroundColor:COLORS[c.origIdx]+'22',
            borderColor:COLORS[c.origIdx],
            pointBackgroundColor:COLORS[c.origIdx],
            borderWidth:2,pointRadius:3

        }
      });
    },80*(ri+1));
  });
}

const GROUPS_KEY = 'interview_groups_v1';
let selectMode = false;
let selectedCandidates = new Set(); // stores candidate names
let editingGroupId = null;

function loadGroups() {
  try { return JSON.parse(localStorage.getItem(GROUPS_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveGroups(groups) {
  localStorage.setItem(GROUPS_KEY, JSON.stringify(groups));
}

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedCandidates.clear();
  document.body.classList.toggle('select-mode', selectMode);
  document.getElementById('selModeBtn').textContent = selectMode ? '✕ 退出选择' : '📅 创建面试分组';
  document.getElementById('selBar').classList.toggle('on', selectMode);
  updateSelBar();
  renderCards();
}

function updateSelBar() {
  const n = selectedCandidates.size;
  document.getElementById('selCount').textContent = `已选 ${n} 人`;
  document.querySelector('.sel-confirm').disabled = n === 0;
}

function toggleCardSelect(name, e) {
  if (!selectMode) return;
  e.stopPropagation();
  if (selectedCandidates.has(name)) {
    selectedCandidates.delete(name);
  } else {
    selectedCandidates.add(name);
  }
  updateSelBar();
  renderCards();
}

    if (!g) return;
    document.querySelector('.g-title').textContent = '✏️ 编辑面试分组';
    document.getElementById('gName').value = g.name;
    document.getElementById('gDate').value = g.date;
    document.getElementById('gTime').value = g.time;
    document.querySelector(`input[name="gFormat"][value="${g.format}"]`).checked = true;
    document.getElementById('gNotes').value = g.notes || '';
    selectedCandidates = new Set(g.members);
  } else {
    document.querySelector('.g-title').textContent = '📅 创建面试分组';
    document.getElementById('gName').value = '';
    document.getElementById('gDate').value = '';
    document.getElementById('gTime').value = '';
    document.querySelector('input[name="gFormat"][value="线上"]').checked = true;
    document.getElementById('gNotes').value = '';
  }

  const namesEl = document.getElementById('gSelectedNames');
  namesEl.innerHTML = [...selectedCandidates].map(n =>
    `<span class="g-name-chip">${n}</span>`
  ).join('');
  document.getElementById('gSub').textContent = `${selectedCandidates.size} 位候选人将加入此分组`;

  modal.classList.add('on');
}

function closeGroupModal() {
  document.getElementById('gOverlay').classList.remove('on');
}

function saveGroup() {
  const name = document.getElementById('gName').value.trim();
  const date = document.getElementById('gDate').value;
  const time = document.getElementById('gTime').value;
  const format = document.querySelector('input[name="gFormat"]:checked').value;
  const notes = document.getElementById('gNotes').value.trim();

  if (!name) { alert('请填写分组名称'); return; }
  if (!date) { alert('请选择面试日期'); return; }
  if (selectedCandidates.size === 0) { alert('请至少选择一位候选人'); return; }

  const groups = loadGroups();
  if (editingGroupId !== null) {
    const idx = groups.findIndex(g => g.id === editingGroupId);
    if (idx >= 0) groups[idx] = { ...groups[idx], name, date, time, format, notes, members: [...selectedCandidates] };
  } else {
    groups.push({ id: Date.now(), name, date, time, format, notes, members: [...selectedCandidates] });
  }
  saveGroups(groups);
  closeGroupModal();
  if (selectMode) toggleSelectMode(); else renderCards();
  renderGroups();
}

function deleteGroup(id) {
  if (!confirm('确认删除此分组？')) return;
  const groups = loadGroups().filter(g => g.id !== id);
  saveGroups(groups);
  renderGroups();
  renderCards();
}

function renderGroups() {
  const groups = loadGroups();
  const wrap = document.getElementById('groupsWrap');
  const titleEl = document.getElementById('groupsTitle');
  const countEl = document.getElementById('groupsCount');

  if (!groups.length) {
    wrap.style.display = 'none';
    titleEl.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';
  titleEl.style.display = 'flex';
  countEl.textContent = `${groups.length} 个分组`;

  groups.sort((a, b) => (a.date + a.time) > (b.date + b.time) ? 1 : -1);

  wrap.innerHTML = groups.map(g => {
    const dateObj = g.date ? new Date(g.date + 'T00:00:00') : null;
    const dateStr = dateObj ? `${dateObj.getMonth()+1}月${dateObj.getDate()}日` : '待定';
    const dayStr = dateObj ? ['日','一','二','三','四','五','六'][dateObj.getDay()] : '';
    const timeStr = g.time || '时间待定';

    const memberChips = g.members.map(name => {
      const c = candidates.find(x => x.name === name);
      const color = c ? COLORS[candidates.indexOf(c) % COLORS.length] : '#6b7280';
      const avatar = c ? c.avatar : name[0];
      return `<div class="gc-chip">
        <div class="gc-avatar" style="background:${color}">${avatar}</div>
        ${name}
      </div>`;
    }).join('');

    return `<div class="group-card">
      <div class="gc-time">
        <div class="gc-date">${dateStr}</div>
        <div class="gc-time-str">周${dayStr} ${timeStr}</div>
        <div class="gc-format">${g.format}</div>
      </div>
      <div class="gc-divider"></div>
      <div class="gc-info">
        <div class="gc-name">${g.name} · ${g.members.length}人</div>
        <div class="gc-members">${memberChips}</div>
        ${g.notes ? `<div class="gc-notes">📝 ${g.notes}</div>` : ''}
      </div>
      <div class="gc-actions">
        <button class="gc-edit" onclick="openGroupModal(${g.id})">编辑</button>
        <button class="gc-del" onclick="deleteGroup(${g.id})">删除</button>
      </div>
    </div>`;
  }).join('');
}

renderGroups();
</script>
</body>
</html>
